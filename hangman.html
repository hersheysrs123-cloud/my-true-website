        <script>
            let category = "";
            let currentWord = "";
            let alphabets = ["a", "b", "c", "d", "e", "f", "g", "h", "i", "j", "k", "l", "m", "n", "o", "p", "q", "r", "s", "t", "u", "v", "w", "x", "y", "z"];
            function startGame() {
                document.getElementById('start').classList.remove('block');
                document.getElementById('game').classList.remove('hidden');
                document.getElementById('start').classList.add('hidden');
                document.getElementById('game').classList.add('block');
                createKeyboard();
            }
            function backMenu(viewName) {
                if (viewName === "category") {
                    document.getElementById('category').classList.remove('block');
                    document.getElementById('category').classList.add('hidden');
                }
                else {
                    document.getElementById('game').classList.remove('block');
                    document.getElementById('game').classList.add('hidden');
                }
                document.getElementById('start').classList.remove('hidden');
                document.getElementById('start').classList.add('block');
                reset();
            }
            function catMenu() {
                document.getElementById('start').classList.remove('block');
                document.getElementById('category').classList.remove('hidden');
                document.getElementById('start').classList.add('hidden');
                document.getElementById('category').classList.add('block');
            }
            function cat(btn) {
                category = btn.textContent;
            }
            function reset() {
                
            }
            function Gletter(btn) {
                let letter = btn.id;
                btn.disabled = true;
            }
            function createKeyboard() {
                for (key in alphabets) {
                    const KeyButton = document.createElement('button');
                    KeyButton.textContent = `${alphabets[key].toUpperCase()}`;
                    KeyButton.classList.add("font-[Syne]", "text-xl", "rounded-xl", "border-blue-600", "bg-blue-500", "border-4", "w-12", "mx-1", "my-1", "transition-all", "hover:scale-125", "duration-300", "ease-in-out", "active:scale-75");
                    KeyButton.id = alphabets[key];
                    KeyButton.onclick = function() {  Gletter(this);  };
                    const container = document.getElementById('keyboard');
                    container.appendChild(KeyButton);

                }
            }
        </script>
